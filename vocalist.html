<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Vocalist Coverflow</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,Arial,sans-serif;
}

body{
height:100vh;
overflow:hidden;

display:flex;
justify-content:center;
align-items:center;

color:white;

background-size:cover;
background-position:center;
background-repeat:no-repeat;

transition:background-image .35s ease;

background-color:#111;
}

.container{
width:100%;
height:100vh;

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

position:relative;
}

.title{
position:absolute;
top:30px;

font-size:34px;
font-weight:700;

text-shadow:
0 0 8px rgba(255,220,120,.4);
}

.logo-home-btn{
position:absolute;

top:20px;
left:20px;

width:58px;
height:58px;

border-radius:50%;
overflow:hidden;

background:rgba(255,255,255,.08);

display:flex;
align-items:center;
justify-content:center;

text-decoration:none;

box-shadow:
0 0 8px rgba(255,220,120,.3);

z-index:20;
}

.logo-home-btn img{
width:100%;
height:100%;
object-fit:cover;
}

.carousel{
position:relative;

width:100%;
height:520px;

display:flex;
justify-content:center;
align-items:center;

overflow:hidden;

cursor:grab;
user-select:none;
}

.carousel:active{
cursor:grabbing;
}

.card{

position:absolute;

width:240px;
height:360px;

border-radius:22px;
overflow:hidden;

cursor:pointer;

transition:
transform .45s ease,
opacity .35s ease;

box-shadow:
0 10px 30px rgba(0,0,0,.35);
}

.card img{
width:100%;
height:100%;
object-fit:cover;
pointer-events:none;
}

.card::after{
content:"";

position:absolute;
inset:0;

background:
linear-gradient(
to top,
rgba(0,0,0,.85),
transparent 55%
);
}

.vocal-name{
position:absolute;

bottom:18px;
left:18px;

z-index:3;

font-size:22px;
font-weight:600;
}

.center{
transform:
translateX(0)
scale(1.08);

opacity:1;
z-index:5;
}

.left1{
transform:
translateX(-220px)
scale(.88);

opacity:.75;
z-index:3;
}

.left2{
transform:
translateX(-400px)
scale(.72);

opacity:.3;
z-index:1;
}

.right1{
transform:
translateX(220px)
scale(.88);

opacity:.75;
z-index:3;
}

.right2{
transform:
translateX(400px)
scale(.72);

opacity:.3;
z-index:1;
}

.controls{
position:absolute;

bottom:70px;

display:flex;
gap:12px;
}

button{
width:48px;
height:48px;

border:none;
border-radius:50%;

cursor:pointer;

font-size:22px;
color:white;

background:
rgba(255,255,255,.12);

box-shadow:
0 0 8px rgba(255,220,120,.25);
}

.home-btn{

position:absolute;

bottom:20px;
left:50%;

transform:translateX(-50%);

width:44px;
height:44px;

border:none;
border-radius:50%;

cursor:pointer;

font-size:18px;

background:
rgba(255,255,255,.12);

color:white;
}

.overlay{

position:fixed;
inset:0;

background:
rgba(0,0,0,.7);

opacity:0;
visibility:hidden;

transition:.3s;
}

.overlay.active{
opacity:1;
visibility:visible;
}

.popup{

position:fixed;

top:50%;
left:50%;

transform:
translate(-50%,-50%)
scale(.9);

width:420px;
max-width:90%;

padding:22px;

background:
rgba(20,20,25,.96);

border-radius:22px;

opacity:0;
visibility:hidden;

transition:.3s;

z-index:100;
}

.popup.active{
opacity:1;
visibility:visible;

transform:
translate(-50%,-50%)
scale(1);
}

.popup img{
width:100%;
height:220px;

object-fit:cover;

border-radius:14px;

margin-bottom:15px;
}

.popup h2{
margin-bottom:12px;
}

.popup p{
line-height:1.6;
margin-bottom:16px;
opacity:.9;
}

.instagram{

display:inline-block;

padding:10px 16px;

border-radius:999px;

text-decoration:none;
color:white;

background:
linear-gradient(
135deg,
#833ab4,
#fd1d1d,
#fcaf45
);
}

.close-btn{
position:absolute;

right:16px;
top:10px;

font-size:26px;

cursor:pointer;
}

.sparkle{

position:fixed;

width:5px;
height:5px;

border-radius:50%;

pointer-events:none;

background:white;

box-shadow:
0 0 8px rgba(255,220,120,.5);

animation:
fade .45s linear forwards;
}

@keyframes fade{

0%{
opacity:1;
transform:scale(1);
}

100%{
opacity:0;
transform:scale(0);
}

}

@media(max-width:900px){

.left1{
transform:
translateX(-150px)
scale(.85);
}

.right1{
transform:
translateX(150px)
scale(.85);
}

.left2{
transform:
translateX(-250px)
scale(.65);
}

.right2{
transform:
translateX(250px)
scale(.65);
}

.card{
width:210px;
height:320px;
}

}

</style>
</head>

<body>

<div class="container">

<a href="index.html"
class="logo-home-btn">

<img
loading="lazy"
src="images/logo.png">

</a>

<div class="title">
Vocalists
</div>

<div
class="carousel"
id="carousel">
</div>

<div class="controls">

<button onclick="prevSlide()">
‹
</button>

<button onclick="nextSlide()">
›
</button>

</div>

<button
class="home-btn"
onclick="location.href='index.html'">

⌂

</button>

</div>

<div
id="overlay"
class="overlay"
onclick="closePopup()">
</div>

<div
id="popup"
class="popup">
</div>

<audio
id="audioPlayer"
preload="none">
</audio>

<script>

const vocalists=[

{
name:"Ade Cahya",
image:"images/ade.webp",
background:"images/ade-bg.webp",
sample:"audio/ade.mp3",
description:"Pop rock vocalist.",
instagram:"@ade",
link:"https://instagram.com/fajar_aminudin99"
},

{
name:"Indah",
image:"images/indah.webp",
background:"images/indah-bg.webp",
sample:"audio/indah.mp3",
description:"Pop jawa dan sinden.",
instagram:"@_rzndh",
link:"https://instagram.com/_rzndh"
},

{
name:"Alfian",
image:"images/alfian.webp",
background:"images/alfian-bg.webp",
sample:"audio/alfian.mp3",
description:"Pop dangdut modern.",
instagram:"@alfian_ally",
link:"https://instagram.com/alfian_ally"
},

{
name:"Sofia",
image:"images/sofia.webp",
background:"images/sofia-bg.webp",
sample:"audio/sofia.mp3",
description:"English pop vocalist.",
instagram:"@thesofia",
link:"https://instagram.com/thesofia"
}

];

let current=0;

const carousel=
document.getElementById(
"carousel"
);

const popup=
document.getElementById(
"popup"
);

const overlay=
document.getElementById(
"overlay"
);

const audio=
document.getElementById(
"audioPlayer"
);

function bg(src){

document.body.style.backgroundImage=

`linear-gradient(
rgba(0,0,0,.45),
rgba(0,0,0,.7)
),
url('${src}')`;

}

function render(){

carousel.innerHTML="";

vocalists.forEach((v,i)=>{

const card=
document.createElement(
"div"
);

card.className="card";

let d=i-current;

if(d===0)
card.classList.add(
"center"
);

if(d===-1)
card.classList.add(
"left1"
);

if(d===-2)
card.classList.add(
"left2"
);

if(d===1)
card.classList.add(
"right1"
);

if(d===2)
card.classList.add(
"right2"
);

card.innerHTML=`

<img
loading="lazy"
src="${v.image}">

<div class="vocal-name">
${v.name}
</div>

`;

card.onclick=()=>{

openPopup(v);

audio.pause();

audio.src=v.sample;

audio.play()
.catch(()=>{});

bg(v.background);

};

carousel.appendChild(
card
);

});

bg(
vocalists[current]
.background
);

}

function openPopup(v){

popup.innerHTML=`

<div
class="close-btn"
onclick="closePopup()">

✕

</div>

<img src="${v.image}">

<h2>
${v.name}
</h2>

<p>
${v.description}
</p>

<a
class="instagram"
href="${v.link}"
target="_blank">

${v.instagram}

</a>

`;

popup.classList.add(
"active"
);

overlay.classList.add(
"active"
);

}

function closePopup(){

popup.classList.remove(
"active"
);

overlay.classList.remove(
"active"
);

}

function nextSlide(){

current=
(current+1)
%
vocalists.length;

render();

}

function prevSlide(){

current=
(current-1+
vocalists.length)
%
vocalists.length;

render();

}

let startX=0;

carousel.addEventListener(
"touchstart",
e=>{

startX=
e.touches[0]
.clientX;

}
);

carousel.addEventListener(
"touchend",
e=>{

let endX=
e.changedTouches[0]
.clientX;

if(endX-startX<-50)
nextSlide();

if(endX-startX>50)
prevSlide();

}
);

document.addEventListener(
"keydown",
e=>{

if(
e.key==="ArrowRight"
)
nextSlide();

if(
e.key==="ArrowLeft"
)
prevSlide();

}
);

let last=0;

function sparkle(x,y){

let now=
Date.now();

if(now-last<80)
return;

last=now;

const s=
document.createElement(
"div"
);

s.className=
"sparkle";

s.style.left=
x+"px";

s.style.top=
y+"px";

document.body.appendChild(
s
);

setTimeout(
()=>s.remove(),
450
);

}

document.addEventListener(
"mousemove",
e=>{

sparkle(
e.clientX,
e.clientY
);

}
);

render();

</script>

</body>
</html>
