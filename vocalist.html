<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocalist Coverflow</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,Arial,sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
color:#fff;
background-size:cover;
background-position:center;
background-repeat:no-repeat;
transition:background-image .6s ease;
}

.container{
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.title{
position:absolute;
top:40px;
font-size:40px;
font-weight:700;
letter-spacing:1px;

text-shadow:
0 0 8px rgba(255,245,210,.95),
0 0 18px rgba(255,223,120,.75),
0 0 36px rgba(255,210,90,.45),
0 10px 30px rgba(0,0,0,.4);
}

.logo-home-btn{
position:absolute;
top:24px;
left:24px;

width:64px;
height:64px;

border-radius:50%;
overflow:hidden;

display:flex;
align-items:center;
justify-content:center;

text-decoration:none;
z-index:50;

background:rgba(255,255,255,.08);
backdrop-filter:blur(14px);

box-shadow:
0 0 12px rgba(255,245,220,.95),
0 0 28px rgba(255,220,120,.45);

animation:logoFloat 3.6s ease-in-out infinite;
transition:.25s ease;
}

.logo-home-btn:hover{
transform:scale(1.08);

box-shadow:
0 0 16px rgba(255,248,230,1),
0 0 34px rgba(255,220,120,.65);
}

.logo-home-btn img{
width:100%;
height:100%;
object-fit:cover;
border-radius:50%;
}

@keyframes logoFloat{
0%{
transform:translateY(0);
}
50%{
transform:translateY(-6px);
}
100%{
transform:translateY(0);
}
}

.carousel{
position:relative;
width:100%;
height:520px;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
cursor:grab;
user-select:none;
}

.carousel:active{
cursor:grabbing;
}

.card{
position:absolute;
width:240px;
height:360px;
border-radius:24px;
overflow:hidden;
cursor:pointer;
transition:.55s cubic-bezier(.2,.8,.2,1);

box-shadow:
0 20px 50px rgba(0,0,0,.35),
0 0 14px rgba(255,230,160,.18);
}

.card img{
width:100%;
height:100%;
object-fit:cover;
pointer-events:none;
}

.card::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(
to top,
rgba(0,0,0,.85),
transparent 50%
);
}

.Vocalist-name{
position:absolute;
bottom:18px;
left:18px;
font-size:24px;
font-weight:600;
z-index:2;
}

.center{
transform:translateX(0) scale(1.15);
z-index:5;
opacity:1;

animation:centerFloat 3.6s ease-in-out infinite;

box-shadow:
0 0 24px rgba(255,245,220,.65),
0 0 48px rgba(255,220,120,.35),
0 0 80px rgba(255,210,90,.18),
0 20px 60px rgba(0,0,0,.45);
}

@keyframes centerFloat{
0%{
transform:
translateX(0)
scale(1.15)
translateY(0);
}

50%{
transform:
translateX(0)
scale(1.15)
translateY(-8px);
}

100%{
transform:
translateX(0)
scale(1.15)
translateY(0);
}
}
.left1{
transform:translateX(-230px) scale(.88);
opacity:.75;
z-index:3;
}

.left2{
transform:translateX(-430px) scale(.72);
opacity:.35;
z-index:1;
}

.right1{
transform:translateX(230px) scale(.88);
opacity:.75;
z-index:3;
}

.right2{
transform:translateX(430px) scale(.72);
opacity:.35;
z-index:1;
}

.controls{
position:absolute;
bottom:60px;
display:flex;
gap:14px;
}

.home-btn{
position:absolute;
bottom:35px;
left:50%;
transform:translate(-50%,25px);

width:40px;
height:40px;
border:none;
border-radius:999px;
cursor:pointer;

font-size:15px;
font-weight:600;
color:#fff;

background:rgba(255,255,255,.08);
backdrop-filter:blur(14px);

display:flex;
align-items:center;
justify-content:center;

box-shadow:
0 0 10px rgba(255,120,120,.85),
0 0 22px rgba(255,40,40,.45);

transition:.25s ease;
z-index:20;
}

.home-btn:hover{
transform:translate(-50%,20px) scale(1.0);

box-shadow:
0 0 14px rgba(255,180,180,1),
0 0 30px rgba(255,50,50,.75);
}

button{
width:50px;
height:50px;
border:none;
border-radius:50%;
font-size:24px;
cursor:pointer;
color:white;

background:rgba(255,255,255,.12);
backdrop-filter:blur(12px);

box-shadow:
0 0 8px rgba(255,245,220,.85),
0 0 18px rgba(255,220,120,.35);

transition:.25s ease;
}

.home-wrap{
position:absolute;
bottom:105px;
display:flex;
justify-content:center;
width:100%;
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.65);
backdrop-filter:blur(8px);
opacity:0;
visibility:hidden;
transition:.3s;
}

.overlay.active{
opacity:1;
visibility:visible;
}

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(.9);

width:420px;
padding:24px;
border-radius:24px;

background:rgba(20,20,30,.96);
backdrop-filter:blur(20px);

box-shadow:
0 0 18px rgba(255,245,220,.45),
0 0 42px rgba(255,220,120,.22),
0 20px 60px rgba(0,0,0,.45);

border:1px solid rgba(255,235,180,.18);

opacity:0;
visibility:hidden;
transition:.3s;
z-index:100;
}

.popup.active{
opacity:1;
visibility:visible;
transform:translate(-50%,-50%) scale(1);
}

.popup img{
width:100%;
height:240px;
object-fit:cover;
border-radius:16px;
margin-bottom:18px;
}

.popup h2{
font-size:30px;
margin-bottom:12px;

text-shadow:
0 0 8px rgba(255,245,220,.95),
0 0 16px rgba(255,220,120,.45);
}

.popup p{
line-height:1.7;
opacity:.85;
margin-bottom:18px;
}

.instagram{
display:inline-block;
padding:10px 18px;
border-radius:999px;
text-decoration:none;
font-weight:600;
color:#fff;
background:linear-gradient(
135deg,
#833ab4,
#fd1d1d,
#fcaf45
);
}

.close-btn{
position:absolute;
right:18px;
top:12px;
font-size:28px;
cursor:pointer;
}

@media(max-width:900px){

.card{
position:absolute;
width:240px;
height:360px;
border-radius:24px;
overflow:hidden;
cursor:pointer;

transition:
transform .65s cubic-bezier(.22,1,.36,1),
opacity .55s ease,
box-shadow .55s ease;

will-change:transform, opacity;

box-shadow:
0 20px 50px rgba(0,0,0,.35),
0 0 14px rgba(255,230,160,.18);
}


.left1{
transform:translateX(-160px) scale(.85);
}

.right1{
transform:translateX(160px) scale(.85);
}

.left2{
transform:translateX(-280px) scale(.68);
}

.right2{
transform:translateX(280px) scale(.68);
}

.popup{
width:90%;
}
}
.sparkle{
position:fixed;
width:8px;
height:8px;
border-radius:50%;
pointer-events:none;
z-index:9999;

background:radial-gradient(
circle,
rgba(255,255,255,1) 0%,
rgba(255,235,170,.95) 45%,
rgba(255,210,120,0) 100%
);

box-shadow:
0 0 8px rgba(255,255,255,.95),
0 0 18px rgba(255,220,120,.8),
0 0 30px rgba(255,200,80,.35);

animation:sparkleFade .7s linear forwards;
}

@keyframes sparkleFade{
0%{
transform:scale(1);
opacity:1;
}

100%{
transform:scale(0);
opacity:0;
}
}
</style>
</head>
<body>

<div class="container">

<a href="index.html" class="logo-home-btn">
<img src="images/logo.png" alt="Home Logo">
</a>

<div class="title">Vocalists</div>

<div class="carousel" id="carousel"></div>

<div class="controls">
<button onclick="prevSlide()">‹</button>
<button onclick="nextSlide()">›</button>
</div>

<button class="home-btn"
onclick="window.location.href='index.html'">
⌂
</button>

</div>

<div id="overlay" class="overlay" onclick="closePopup()"></div>
<div id="popup" class="popup"></div>

<audio id="audioPlayer"></audio>

<script>
const Vocalists = [

{
name:"Ade Cahya",
image:"images/ade.jpg",
background:"images/ade-bg.jpg",
sample:"audio/ade.mp3",
description:"American singer and songwriter known for her powerful vocals and pop music.",
instagramName:"@ade",
instagramLink:"https://instagram.com/fajar_aminudin99"
},

{
name:"Indah",
image:"images/indah.jpg",
background:"images/indah-bg.jpg",
sample:"audio/indah.mp3",
description:"Singer-songwriter known for emotional storytelling and iconic pop-country music.",
instagramName:"@_rzndh",
instagramLink:"https://instagram.com/_rzndh"
},

{
name:"Alfian",
image:"images/alfian.jpg",
background:"images/alfian-bg.jpg",
sample:"audio/alfian.mp3",
description:"Alternative pop singer with a dark and minimalist signature style.",
instagramName:"@alfian_ally",
instagramLink:"https://instagram.com/alfian_ally"
},

{
name:"Sofia",
image:"images/sofia.jpg",
background:"images/sofia-bg.jpg",
sample:"audio/sofia.mp3",
description:"Canadian Vocalist known for cinematic visuals and modern R&B sound.",
instagramName:"@thesofia",
instagramLink:"https://instagram.com/thesofia"
}

];

let current = 0;

const carousel = document.getElementById("carousel");
const popup = document.getElementById("popup");
const overlay = document.getElementById("overlay");
const audioPlayer = document.getElementById("audioPlayer");

function updateBackground(src){
document.body.style.backgroundImage=
`linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.65)),url('${src}')`;
}

function playSample(src){
audioPlayer.pause();
audioPlayer.currentTime=0;
audioPlayer.src=src;
audioPlayer.play().catch(()=>{});
}

function renderCarousel(){

carousel.innerHTML="";

Vocalists.forEach((Vocalist,index)=>{

const card=document.createElement("div");
card.className="card";

let diff=index-current;

if(diff===0) card.classList.add("center");
if(diff===-1) card.classList.add("left1");
if(diff===-2) card.classList.add("left2");
if(diff===1) card.classList.add("right1");
if(diff===2) card.classList.add("right2");

card.innerHTML=`
<img src="${Vocalist.image}">
<div class="Vocalist-name">${Vocalist.name}</div>
`;

card.onclick=()=>{
openPopup(Vocalist);
playSample(Vocalist.sample);
updateBackground(Vocalist.background);
};

carousel.appendChild(card);

});

updateBackground(Vocalists[current].background);
}

function openPopup(Vocalist){

popup.innerHTML=`
<div class="close-btn" onclick="closePopup()">✕</div>

<img src="${Vocalist.image}">

<h2>${Vocalist.name}</h2>

<p>${Vocalist.description}</p>

<a
href="${Vocalist.instagramLink}"
target="_blank"
class="instagram"
>
${Vocalist.instagramName}
</a>
`;

popup.classList.add("active");
overlay.classList.add("active");
}

function closePopup(){
popup.classList.remove("active");
overlay.classList.remove("active");
}

function nextSlide(){
current=(current+1)%Vocalists.length;
renderCarousel();
}

function prevSlide(){
current=(current-1+Vocalists.length)%Vocalists.length;
renderCarousel();
}

/* DRAG MOUSE + SWIPE */

let startX=0;
let isDragging=false;

carousel.addEventListener("mousedown",(e)=>{
isDragging=true;
startX=e.clientX;
});

window.addEventListener("mouseup",(e)=>{

if(!isDragging) return;

let diff=e.clientX-startX;

if(diff<-50){
nextSlide();
}

if(diff>50){
prevSlide();
}

isDragging=false;
});

carousel.addEventListener("touchstart",(e)=>{
startX=e.touches[0].clientX;
});

carousel.addEventListener("touchend",(e)=>{

let endX=e.changedTouches[0].clientX;
let diff=endX-startX;

if(diff<-50){
nextSlide();
}

if(diff>50){
prevSlide();
}

});

document.addEventListener("keydown",(e)=>{
if(e.key==="ArrowRight") nextSlide();
if(e.key==="ArrowLeft") prevSlide();
});

renderCarousel();

function createSparkle(x,y){

const sparkle=document.createElement("div");
sparkle.className="sparkle";

sparkle.style.left = x + "px";
sparkle.style.top = y + "px";

document.body.appendChild(sparkle);

setTimeout(()=>{
sparkle.remove();
},700);
}

/* DESKTOP */
document.addEventListener("mousemove",(e)=>{
createSparkle(e.clientX,e.clientY);
});

/* ANDROID / MOBILE TAP */
document.addEventListener("touchstart",(e)=>{
const touch = e.touches[0];
createSparkle(touch.clientX,touch.clientY);
});

/* ANDROID SWIPE */
document.addEventListener("touchmove",(e)=>{
const touch = e.touches[0];
createSparkle(touch.clientX,touch.clientY);
});

</script>

</body>
</html>
